aid: todo-group
name: TODO Group
description: >-
  The TODO Group is an open community of practitioners under the Linux Foundation
  who collaborate on best practices, tools, and guidance for running successful
  Open Source Program Offices (OSPOs). It provides open source tooling including
  Repolinter for repository linting, the OSPO Landscape mapping OSPO adopters
  and tools, comprehensive OSPO guides and case studies, and OSPOlogy community
  programs. The TODO Group serves organizations managing enterprise open source
  strategies across 120+ member organizations.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Community
  - Linux Foundation
  - Open Source
  - OSPO
created: '2026-03-16'
modified: '2026-05-03'
url: >-
  https://raw.githubusercontent.com/api-evangelist/todo-group/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: todo-group:repolinter
    name: Repolinter
    description: >-
      Repolinter is an open source linting tool for repositories that validates
      compliance with open source best practices. It checks repositories for
      standard files like LICENSE, README, CONTRIBUTING, and CODE-OF-CONDUCT,
      and supports configurable rulesets. Available as a CLI tool
      (repolinter lint) and a JavaScript API for programmatic integration.
      Installable via npm as the repolinter package.
    humanURL: https://github.com/todogroup/repolinter
    tags:
      - Linting
      - Open Source
      - Repository
      - Compliance
    properties:
      - type: Documentation
        url: https://github.com/todogroup/repolinter
      - type: GitHubRepository
        url: https://github.com/todogroup/repolinter
      - type: NpmPackage
        url: https://www.npmjs.com/package/repolinter

  - aid: todo-group:repolinter-action
    name: Repolinter Action
    description: >-
      A GitHub Action that runs Repolinter on repositories as part of CI/CD
      workflows. Validates repositories against configurable rulesets to enforce
      open source compliance policies. Supports outputting results as exit codes
      for PR status checks or creating GitHub issues for non-intrusive
      notifications. Originally created by New Relic, maintained by TODO Group.
    humanURL: https://github.com/todogroup/repolinter-action
    tags:
      - GitHub Actions
      - Linting
      - CI/CD
      - Compliance
    properties:
      - type: Documentation
        url: https://github.com/todogroup/repolinter-action
      - type: GitHubRepository
        url: https://github.com/todogroup/repolinter-action
      - type: GitHubMarketplace
        url: https://github.com/marketplace/actions/repolinter-action

  - aid: todo-group:ospo-landscape
    name: OSPO Landscape
    description: >-
      An interactive landscape mapping the Open Source Program Office ecosystem,
      including OSPO adopter organizations and tools supporting OSPO operations.
      Data is maintained in landscape.yml and browsable at landscape.todogroup.org.
      Modeled after the CNCF landscape approach, covering companies, governments,
      academic institutions, and supporting tooling.
    humanURL: https://landscape.todogroup.org/
    tags:
      - Landscape
      - OSPO
      - Ecosystem
      - Data
    properties:
      - type: Documentation
        url: https://landscape.todogroup.org/
      - type: GitHubRepository
        url: https://github.com/todogroup/ospolandscape
      - type: Website
        url: https://landscape.todogroup.org/

  - aid: todo-group:ospo-guides
    name: OSPO Guides
    description: >-
      A comprehensive collection of 23+ practitioner guides covering all aspects
      of running Open Source Program Offices. Topics include creating an OSPO,
      setting open source strategy, measuring program success, managing career
      development, recruiting open source developers, legal compliance, and
      community engagement. All guides are open source and community-contributed.
    humanURL: https://todogroup.org/guides/
    tags:
      - Guides
      - OSPO
      - Best Practices
      - Documentation
    properties:
      - type: Documentation
        url: https://todogroup.org/guides/
      - type: GitHubRepository
        url: https://github.com/todogroup/guides

  - aid: todo-group:ospology
    name: OSPOlogy
    description: >-
      The OSPOlogy program provides monthly community webinars, working group
      meetings, and collaborative sessions focused on OSPO practices and
      challenges. It serves as the primary community engagement platform for
      TODO Group members and OSPO practitioners worldwide, covering topics
      from OSPO maturity models to specific industry challenges.
    humanURL: https://community.linuxfoundation.org/todo-group-ospology/
    tags:
      - Community
      - Webinars
      - OSPO
      - Education
    properties:
      - type: Documentation
        url: https://github.com/todogroup/ospology
      - type: GitHubRepository
        url: https://github.com/todogroup/ospology
      - type: Website
        url: https://community.linuxfoundation.org/todo-group-ospology/

  - aid: todo-group:ospo-career-path
    name: OSPO Career Path
    description: >-
      An open source career development framework defining roles, skills, and
      progression paths for OSPO professionals. Covers job functions from
      open source program manager to legal counsel, providing organizations
      with a structured approach to building and growing OSPO teams with
      defined competencies and seniority levels.
    humanURL: https://github.com/todogroup/ospo-career-path
    tags:
      - Career Development
      - OSPO
      - Human Resources
      - Skills Framework
    properties:
      - type: Documentation
        url: https://github.com/todogroup/ospo-career-path
      - type: GitHubRepository
        url: https://github.com/todogroup/ospo-career-path

